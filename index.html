<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/svg+xml" href="/portal-icon-pure.svg">
<style>
body {
font-family: 'Helvetica Neue', sans-serif;
background: #121212;
color: #fff;
text-align: center;
padding: 30px 20px;
margin: 0;
}
.logo-container {
max-width: 500px;
margin: 0 auto 20px;
padding: 10px;
}
.logo-img {

height: auto;
display: block;
}

}
.container {
display: flex;
justify-content: center;
gap: 25px;
flex-wrap: wrap;

border: 2px solid #333;
padding: 25px;
border-radius: 15px;
width: 240px;
text-decoration: none;
color: #fff;

}
.card:hover {
border-color: #00ffff;
transform: translateY(-5px);
box-shadow: 0 10px 20px rgba(0,255,255,0.1);
}
.card-icon {
width: 80px;
height: 80px;
margin: 0 auto 15px;

.card h3 {

<a href="/ekilocate/" class="card">
