name: Auto Update Stations
on:
  schedule:
    - cron: '0 19 * * *' # 毎日UTC19時（日本時間の朝4時）に実行
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 自動Pushのための書き込み権限を明示
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Run script
        env:
          TZ: 'Asia/Tokyo' # Pythonに日本時間で曜日判定をさせる
        run: python extract_stations.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stations.json
          git diff --cached --quiet || (git commit -m "Auto-update stations.json [skip ci]" && git push)
