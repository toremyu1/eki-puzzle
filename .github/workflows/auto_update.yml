name: Daily Station Extraction

on:
  schedule:
    # 日本時間(JST)の深夜3時は、協定世界時(UTC)の前日18時です
    - cron: '0 18 * * *'
  # 手動でもボタンから実行できるようにする設定
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run extraction script
        run: python extract_stations.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stations.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update stations.json" && git push)
