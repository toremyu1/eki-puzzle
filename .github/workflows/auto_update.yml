name: Daily Station Extraction

on:
  schedule:
    # 日本時間(JST)の深夜3時は、協定世界時(UTC)の前日18時です
    - cron: '0 13 * * *'
  # 手動でもボタンから実行できるようにする設定
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run extraction script
        run: python extract_stations.py

      - name: 取得したデータをコミットしてプッシュする
        run: |
          # 誰が更新したかを記録するためのGitの初期設定です
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # stations.jsonの変更内容を記録対象にします
          git add stations.json
          
          # 変更がある場合のみコミット（保存）し、リポジトリへプッシュ（反映）します
          git commit -m "Auto-update stations.json" || echo "No changes to commit"

          # プッシュする前にGitHub側の最新データをダウンロードして合流させる
          git pull origin development --rebase
          
          # 最後にリポジトリへプッシュ（反映）します
          git push
