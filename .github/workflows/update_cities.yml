# ワークフローの名前
name: Update City Categories (5日おき)

# 実行されるタイミングの設定
on:
  # cron構文で「毎月 1, 6, 11, 16, 21, 26, 31日の 午前3時（日本時間）」に実行
  # ※GitHub Actionsの時間はUTC（協定世界時）のため、日本時間から9時間引いた時刻を指定します
  # 午前3時JST ＝ 前日の午後18時UTC となります。
  schedule:
    - cron: '19 17 */5 * *'
  
  # 手動でいつでも実行できるようにする設定（テスト時に便利です）
  workflow_dispatch:

# 実行権限の設定（自動コミット＆プッシュを行うために必須です）
permissions:
  contents: write

jobs:
  update-data:
    # 仮想サーバーのOSを指定（最新のUbuntu）
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのコードを仮想サーバーに展開する
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ← この2行を追加します

      # 2. Pythonの実行環境（バージョン3.x）をセットアップする
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. スクリプトの実行に必要な外部ライブラリをインストールする
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 4. 作成したPythonスクリプトを実行する
      - name: Run Python script
        run: python update_city_categories.py

      # 5. 更新されたJSONファイルをリポジトリに自動保存（コミット＆プッシュ）する
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 新しく生成されたファイルをステージングエリアに追加
          git add city_categories.json
          
          # データに更新（差分）があった場合のみ処理を行う
          if ! git diff --cached --quiet; then
            # [A] 現在のブランチにコミットしてプッシュ
            git commit -m "Auto-update city categories"
            git push origin HEAD
            
            # [B] ファイルを一時退避
            cp city_categories.json /tmp/city_categories.json
            
            # [C] リモートの development ブランチを正確に取得して切り替え
            git fetch origin development:development
            git checkout development
            
            # [D] 退避ファイルを上書きして追加
            cp /tmp/city_categories.json city_categories.json
            git add city_categories.json
            
            # [E] development 側でも差分があるか確認し、あればコミットしてプッシュ
            if ! git diff --cached --quiet; then
              git commit -m "Auto-update city categories (development)"
              git push origin development
            else
              echo "developmentブランチ側はすでに最新のため、コミットをスキップしました。"
            fi
            
          else
            echo "データの更新がなかったため、プッシュは行われませんでした。"
          fi
