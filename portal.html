<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>駅データパズルポータル | 駅パズル.com</title>
  <link rel="icon" type="image/svg+xml" href="/portal-icon-pure.svg">
  <link rel="stylesheet" href="/portal.css">
</head>
<body>
  <div class="logo-container">
    <img src="/portal-logo.svg" alt="駅パズル.com" class="logo-img">
  </div>
  
  <p class="site-desc">日本の鉄道駅データと地理の論理パズル集</p>
  
  <div class="container">
    <a href="/ekidle/" class="card">
      <div class="card-icon">
        <img src="/ekidle-icon.svg" alt="駅ドル" width="100%" height="100%">
      </div>
      <h3>🧩 駅ドル</h3>
      <p>Wordle風の大人気の文字色推理パズル</p>
    </a>
    
    <a href="/ekilocate/" class="card">
      <div class="card-icon">
        <img src="/ekilocate-icon.svg" alt="駅ロケ" width="100%" height="100%">
      </div>
      <h3>🌐 駅ロケ</h3>
      <p>距離と事業者・路線のヒントから駅を当てる地理パズル</p>
    </a>
  </div>

  <div class="data-management-section">
    <p class="data-management-title">⚙️ データ管理・サポート</p>
    <div class="data-management-buttons">
      <a href="#" id="btn-export-all" class="btn-manage btn-export">📤 全データ一括バックアップ</a>
      <a href="#" id="btn-import-all" class="btn-manage btn-import">📥 全データ一括復元</a>
      <a href="/ekidle/?emergency_reset=true" id="btn-emergency" class="btn-manage btn-emergency">🚨 非常用リセット</a>
    </div>
  </div>

  <script src="/common.js"></script>
  <script src="/portal.js"></script>
</body>
</html>
